name: Fetch Insider Trades

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/FetchTrades/FetchTrades.csproj

      - name: Run fetcher
        env:
          ConnectionStrings__PostgresConnection: ${{ secrets.POSTGRES_CONNECTION }}
          Email__SmtpHost: ${{ secrets.EMAIL_SMTPHOST }}
          Email__SmtpPort: ${{ secrets.EMAIL_SMTPPORT }}
          Email__FromAddress: ${{ secrets.EMAIL_FROMADDRESS }}
          Email__SmtpUsername: ${{ secrets.EMAIL_SMTPUSERNAME }}
          Email__SmtpPassword: ${{ secrets.EMAIL_SMTPPASSWORD }}
          
        run: dotnet run --project src/FetchTrades/FetchTrades.csproj
