name: .NET CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: src
        run: dotnet restore AktieKoll.slnx

      - name: Build
        working-directory: src
        run: dotnet build AktieKoll.slnx --no-restore --configuration Release

      - name: Test
        working-directory: src
        run: dotnet test  AktieKoll.slnx --no-build --configuration Release --verbosity normal

  deploy:
    name: Deploy to Azure
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/aktiekoll-api:${{ github.sha }} \
            -f src/AktieKoll/Dockerfile src/
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/aktiekoll-api:${{ github.sha }}
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/aktiekoll-api:${{ github.sha }} \
            ${{ secrets.ACR_LOGIN_SERVER }}/aktiekoll-api:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/aktiekoll-api:latest
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/aktiekoll-api:${{ github.sha }}